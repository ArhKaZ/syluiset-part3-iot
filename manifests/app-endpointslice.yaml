apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: wil-playground
  labels:
    kubernetes.io/service-name: wil-playground
addressType: IPv4
ports:
  - name: http
    protocol: TCP
    port: 8888
endpoints:
  - addresses:
      - "127.0.0.1"
    conditions:
      ready: true
    hostname: wil-playground
    nodeName: wil-playground
